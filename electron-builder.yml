appId: com.monday.finance-dashboard
productName: Monday Finance
copyright: Copyright © 2026 Monday Finance
directories:
  output: release
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: .env
    to: .env
  - from: ../FinanceDashboardV1/dist
    to: dashboard
    filter: ["**/*"]
mac:
  category: public.app-category.finance
  target:
    - dir
win:
  target:
    - dir
